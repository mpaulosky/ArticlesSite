name: lint-yaml

on:
  pull_request:
    branches: [dev, preview, main, insider]
  workflow_dispatch:

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            ignore: |
              .squad/
            rules:
              line-length:
                max: 200
                allow-non-breakable-inline-mappings: true
              truthy:
                allowed-values: ['true', 'false', 'on']
              brackets:
                min-spaces-inside: 0
                max-spaces-inside: 1
